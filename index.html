<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>恐龙星球守卫战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
#app{position:fixed;inset:0;}
#gw{position:relative;width:100%;height:100%;overflow:hidden;}
canvas#gc{position:absolute;inset:0;width:100%;height:100%;}
#ui{position:absolute;inset:0;pointer-events:none;}
.scr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:all;overflow-y:auto;}
.hide{display:none!important;}
:root{--g:#1B8A5A;--am:#E6900A;--bl:#1565C0;--pu:#5E35B1;--rd:#C62828;}

/* MAP */
#map{background:linear-gradient(135deg,#e0f7fa,#f1f8e9);}
.mwrap{width:90%;max-width:780px;text-align:center;padding:20px 0;}
.mtitle{font-size:26px;font-weight:800;color:var(--g);margin-bottom:6px;}
.msub{font-size:13px;color:#5a7a5a;margin-bottom:20px;}
.mlevels{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.mlv{width:170px;border-radius:18px;border:2px solid #a5d6a7;background:#fff;padding:16px;cursor:pointer;transition:all .15s;box-shadow:0 3px 10px rgba(0,0,0,.08);}
.mlv:hover{transform:translateY(-3px);border-color:var(--g);}
.mlv.locked{opacity:.4;cursor:not-allowed;pointer-events:none;}
.lvi{font-size:40px;margin-bottom:6px;}
.lvn{font-size:14px;font-weight:700;color:var(--g);}
.lvd{font-size:11px;color:#5a7a5a;margin-top:3px;line-height:1.5;}
.lvs{font-size:18px;margin-top:6px;letter-spacing:3px;}

/* STORY */
#story{background:linear-gradient(135deg,#f1f8e9,#e3f2fd);}
.swrap{width:90%;max-width:740px;display:flex;flex-direction:column;gap:10px;padding:16px 0;}
.shdr{display:flex;align-items:center;gap:14px;}
.sdino{font-size:46px;animation:bob 1.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.stxt h2{font-size:18px;color:var(--g);font-weight:800;}
.stxt p{font-size:11px;color:#5a7a5a;}
.spass{background:#f0faf5ee;border:1.5px solid #a5d6a7;border-radius:12px;padding:14px 18px;font-size:14px;color:#1a3a2a;line-height:2.3;}
.bl{display:inline-flex;align-items:center;justify-content:center;min-width:56px;height:26px;border-radius:6px;border:2px dashed #43A87A;background:rgba(67,168,122,.08);color:var(--am);font-weight:700;font-size:13px;cursor:pointer;padding:0 6px;vertical-align:middle;transition:all .15s;pointer-events:all;}
.bl.sel{border-color:var(--am);border-style:solid;}
.bl.ok{border-style:solid;border-color:var(--g);background:rgba(27,138,90,.1);color:var(--g);}
.bl.err{border-color:var(--rd);color:var(--rd);animation:shk .3s ease;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pbl{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:5px;border:2px dashed var(--pu);background:rgba(94,53,177,.06);color:var(--am);font-weight:700;font-size:17px;cursor:pointer;vertical-align:middle;transition:all .15s;pointer-events:all;}
.pbl.sel{border-color:var(--am);border-style:solid;}
.pbl.ok{border-style:solid;border-color:var(--pu);color:var(--pu);}
.pbl.err{border-color:var(--rd);color:var(--rd);animation:shk .3s ease;}
.pbox{background:#f0faf5ee;border:1.5px solid #b39ddb;border-radius:12px;padding:14px 18px;}
.pmeta{font-size:12px;color:var(--pu);margin-bottom:10px;}
.pline{font-size:17px;color:#1a3a2a;line-height:2.8;letter-spacing:3px;}
.wb{background:#fff;border:1.5px solid #a5d6a7;border-radius:10px;padding:10px 14px;}
.wbt{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--am);font-weight:600;}
.wbh{font-size:11px;color:#5a7a5a;flex:1;}
.wbo{display:flex;gap:8px;flex-wrap:wrap;}
.wc{padding:7px 16px;border-radius:20px;border:1.5px solid #a5d6a7;background:#fff;color:var(--bl);font-size:13px;cursor:pointer;pointer-events:all;transition:all .12s;}
.wc:hover{border-color:var(--g);color:var(--g);}
.wc.used{opacity:.3;pointer-events:none;}
.sfb{font-size:12px;min-height:16px;}
.sbtn{padding:10px 28px;border-radius:10px;background:var(--g);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;align-self:flex-start;}
.sbtn.show{opacity:1;pointer-events:all;}

/* MATH */
#math{background:linear-gradient(135deg,#e3f2fd,#e8eaf6);}
.mathwrap{width:88%;max-width:540px;display:flex;flex-direction:column;gap:14px;padding:16px 0;}
.mathcard{background:#fff;border:1.5px solid #90caf9;border-radius:16px;padding:20px;}
.mtag{font-size:12px;color:var(--bl);margin-bottom:8px;font-weight:700;}
.msc{font-size:13px;color:#1a237e;line-height:1.9;margin-bottom:12px;background:#e8eaf6;border-radius:8px;padding:10px 12px;}
.msc b{color:var(--am);}
.mq{font-size:15px;color:#1a3a2a;font-weight:700;margin-bottom:14px;}
.mir{display:flex;gap:8px;margin-bottom:6px;}
#mans{flex:1;height:46px;border-radius:8px;border:2px solid #90caf9;background:#fff;color:#1a3a2a;font-size:24px;font-weight:700;text-align:center;outline:none;}
#mok{height:46px;padding:0 18px;border-radius:8px;background:var(--bl);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.mfb{font-size:12px;min-height:16px;margin-top:4px;}
.mfb.ok{color:var(--g);}.mfb.err{color:var(--rd);}
.mat{font-size:11px;color:#7986cb;margin-top:6px;}
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.nb{height:48px;border-radius:8px;border:1.5px solid #90caf9;background:#fff;color:#1a3a2a;font-size:20px;font-weight:700;cursor:pointer;}
.nb:active{background:#e3f2fd;}
.nb.go{background:var(--bl);color:#fff;}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;height:48px;background:rgba(255,255,255,.92);border-bottom:1px solid #c8e6c9;display:flex;align-items:center;padding:0 14px;gap:12px;pointer-events:none;}
.hz{font-size:12px;color:var(--g);font-weight:700;}
.hpb{width:80px;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
.hpf{height:100%;background:#43A87A;border-radius:4px;transition:width .3s;}
.hpt{font-size:10px;color:var(--g);}
.hsc{font-size:12px;color:var(--bl);font-weight:700;}
.hpg{font-size:11px;color:var(--am);font-weight:700;}
/* type badge in HUD */
.htype{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.htype.en{background:#e3f2fd;color:var(--bl);}
.htype.cn{background:#f3e5f5;color:var(--pu);}
.htype.ma{background:#fff8e1;color:#e65100;}

/* Q PANEL bottom */
#qp{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:2px solid #c8e6c9;padding:10px 16px 12px;pointer-events:none;box-shadow:0 -3px 12px rgba(0,0,0,.08);}
#qtb{font-size:10px;color:#5a7a5a;margin-bottom:3px;font-weight:600;}
#qrow{display:flex;align-items:center;gap:12px;}
#qsc{border-radius:8px;border:1.5px solid #c8e6c9;background:#f9fbe7;flex-shrink:0;display:none;width:130px;height:110px;}
#qt{font-size:15px;color:#1a3a2a;font-weight:700;line-height:1.6;flex:1;white-space:pre-line;}
#wpl{padding-top:6px;border-top:1px solid #e8f5e9;margin-top:6px;display:none;}
#wsl{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
.ws{width:46px;height:46px;border-radius:8px;border:2px solid #c8e6c9;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#bdbdbd;background:#fff;}
.ws.ok{border-color:var(--g);color:var(--g);background:#f0faf5;}
#wzh{font-size:11px;color:#5a7a5a;margin-top:3px;}

/* CONTROLS */
#jz{position:absolute;pointer-events:all;}
#jb{position:absolute;inset:0;border-radius:50%;background:rgba(27,138,90,.12);border:2px solid rgba(27,138,90,.3);}
#jk{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(27,138,90,.55);border:2px solid var(--g);top:50%;left:50%;transform:translate(-50%,-50%);}
#eb{position:absolute;border-radius:50%;background:rgba(230,144,10,.18);border:2.5px solid var(--am);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;transition:all .12s;}
#eb:active{transform:scale(.9);}
#eb.rdy{background:rgba(230,144,10,.42);box-shadow:0 0 18px rgba(230,144,10,.5);}
#bfw{position:absolute;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--am);}
#bfb{height:5px;background:#ffe082;border-radius:3px;overflow:hidden;width:100%;}
#bff{height:100%;background:var(--am);border-radius:3px;width:0%;}
#kh{position:absolute;top:52px;right:14px;font-size:10px;color:#9e9e9e;line-height:1.8;pointer-events:none;text-align:right;}
#dmg{position:absolute;inset:0;background:rgba(198,40,40,.22);pointer-events:none;opacity:0;transition:opacity .12s;}
#wpop{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:800;color:var(--g);pointer-events:none;opacity:0;white-space:nowrap;transition:opacity .2s;}

/* READING */
#reading{background:linear-gradient(135deg,#f3e5f5,#e8eaf6);}
.rpanel{background:#fff;border:2px solid #ce93d8;border-radius:16px;padding:22px;width:86%;max-width:560px;}
.rtag{font-size:12px;color:var(--pu);margin-bottom:10px;font-weight:700;}
.rpsg{font-size:13px;color:#1a3a2a;line-height:1.9;background:#f3e5f5;border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.rq{font-size:14px;color:#1a3a2a;font-weight:700;margin-bottom:12px;}
.ro-wrap{display:flex;flex-direction:column;gap:8px;}
.ro{padding:10px 14px;border-radius:8px;border:1.5px solid #ce93d8;background:#fff;color:#1a3a2a;font-size:13px;cursor:pointer;pointer-events:all;text-align:left;}
.ro:hover{border-color:var(--pu);background:#f3e5f5;}
.ro.cor{border-color:var(--g);background:#f0faf5;color:var(--g);}
.ro.wrg{border-color:var(--rd);background:#ffebee;color:var(--rd);}
.rfb{font-size:12px;min-height:16px;margin-top:10px;}
.rnxt{margin-top:14px;width:100%;padding:11px;border-radius:10px;background:var(--g);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;}
.rnxt.show{opacity:1;pointer-events:all;}

/* RESULT */
#result{background:linear-gradient(135deg,#e8f5e9,#fff9c4);}
.rsp{background:#fff;border:2px solid #a5d6a7;border-radius:20px;padding:22px 26px;width:82%;max-width:500px;text-align:center;}
.rdi{font-size:52px;margin-bottom:6px;}
.rti{font-size:22px;font-weight:800;color:var(--g);margin-bottom:4px;}
.rsu{font-size:12px;color:#5a7a5a;margin-bottom:12px;}
.rst{font-size:34px;letter-spacing:6px;margin-bottom:12px;}
.rss{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.rs{background:#f1f8e9;border-radius:8px;padding:7px 4px;border:1px solid #c8e6c9;text-align:center;}
.rsl{font-size:10px;color:#5a7a5a;}
.rsv{font-size:18px;font-weight:700;color:var(--am);margin-top:2px;}
.xpw{background:#e0e0e0;border-radius:6px;height:10px;overflow:hidden;margin-bottom:5px;}
.xpf{height:100%;background:var(--g);border-radius:6px;transition:width 1s;}
.xpl{font-size:11px;color:#5a7a5a;margin-bottom:12px;}
.rbs{display:flex;gap:10px;}
.rb{flex:1;padding:11px;border-radius:10px;background:var(--g);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.rb.sec{background:transparent;border:2px solid #a5d6a7;color:var(--g);}
@keyframes sP{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.sa{display:inline-block;animation:sP .4s ease forwards;opacity:0;}
</style>
</head>
<body>
<div id="app"><div id="gw">
<canvas id="gc"></canvas>
<div id="ui">

<div id="hud" class="hide">
  <span class="hz" id="hz">🌿</span>
  <div style="display:flex;align-items:center;gap:5px;"><div class="hpb"><div class="hpf" id="hpf" style="width:100%"></div></div><span class="hpt" id="hpt">100%</span></div>
  <div style="flex:1"></div>
  <span class="htype" id="htype"></span>
  <span class="hpg" id="hpg">0/20</span>
  <span class="hsc">⭐<span id="hsc">0</span></span>
  <span id="hbf" style="font-size:11px;color:var(--am);display:none"></span>
</div>

<div id="qp" class="hide">
  <div id="qtb"></div>
  <div id="qrow">
    <canvas id="qsc" width="260" height="220"></canvas>
    <div id="qt"></div>
  </div>
  <div id="wpl">
    <div style="font-size:10px;color:#5a7a5a;">🔡 拼出单词：</div>
    <div id="wsl"></div>
    <div id="wzh"></div>
  </div>
</div>

<div id="kh" class="hide">WASD 移动 · 空格 吞噬/踩蛋/撞陨石</div>
<div id="jz" class="hide"><div id="jb"></div><div id="jk"></div></div>
<div id="eb" class="hide"><div style="font-size:28px">👄</div><div style="font-size:10px;color:var(--am);font-weight:700;margin-top:2px" id="eblbl">吞噬</div></div>
<div id="bfw" class="hide">⚡加速<div id="bfb"><div id="bff"></div></div></div>
<div id="dmg"></div>
<div id="wpop"></div>

<!-- MAP -->
<div id="map" class="scr">
  <div class="mwrap">
    <div class="mtitle">🌍 恐龙星球守卫战</div>
    <div class="msub">语文·数学·英语 · 每次随机不重复</div>
    <div class="mlevels" id="mlevels"></div>
    <button id="music-btn" onclick="toggleMusic()" style="padding:8px 20px;border-radius:20px;border:1.5px solid #a5d6a7;background:#fff;color:#1B8A5A;font-size:13px;font-weight:600;cursor:pointer;">🔊 开启音乐</button>
  </div>
</div>

<!-- STORY -->
<div id="story" class="scr hide">
  <div class="swrap">
    <div class="shdr"><div class="sdino" id="sdino">🦖</div><div class="stxt"><h2 id="stitle"></h2><p id="ssub"></p></div></div>
    <div id="scontent"></div>
    <div class="wb">
      <div class="wbt">👆 <span id="wbp">请点击空格选词</span><span class="wbh" id="wbh"></span></div>
      <div class="wbo" id="wbo"></div>
    </div>
    <div class="sfb" id="sfb"></div>
    <button class="sbtn" id="snxt" onclick="goMath()">⚡ 激活防御系统 →</button>
  </div>
</div>

<!-- MATH -->
<div id="math" class="scr hide">
  <div class="mathwrap">
    <div class="mathcard">
      <div class="mtag">⚡ 计算能量值 · 答对解锁速度加成</div>
      <div class="msc" id="msc"></div>
      <div class="mq" id="mq"></div>
      <div class="mir"><input id="mans" type="number" placeholder="?" readonly><button id="mok" onclick="chkMath()">确认</button></div>
      <div class="mfb" id="mfb"></div>
      <div class="mat" id="mat"></div>
    </div>
    <div class="numpad">
      <button class="nb" onclick="nb('7')">7</button><button class="nb" onclick="nb('8')">8</button><button class="nb" onclick="nb('9')">9</button><button class="nb" onclick="nb('del')" style="color:var(--rd)">⌫</button><button class="nb go" style="grid-row:span 2" onclick="chkMath()">✓</button>
      <button class="nb" onclick="nb('4')">4</button><button class="nb" onclick="nb('5')">5</button><button class="nb" onclick="nb('6')">6</button><button class="nb" onclick="nb('0')">0</button>
      <button class="nb" onclick="nb('1')" style="grid-column:span 2">1</button><button class="nb" onclick="nb('2')" style="grid-column:span 2">2</button>
      <button class="nb" onclick="nb('3')" style="grid-column:span 2">3</button>
    </div>
  </div>
</div>

<!-- READING -->
<div id="reading" class="scr hide">
  <div class="rpanel">
    <div class="rtag">📖 阅读理解 · 答对+50XP</div>
    <div class="rpsg" id="rpsg"></div>
    <div class="rq" id="rq"></div>
    <div class="ro-wrap" id="rowrap"></div>
    <div class="rfb" id="rfb"></div>
    <button class="rnxt" id="rnxt" onclick="goResult()">查看结算 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="scr hide">
  <div class="rsp">
    <div class="rdi" id="rdi">🏆</div>
    <div class="rti" id="rti"></div>
    <div class="rsu" id="rsu"></div>
    <div class="rst" id="rst"></div>
    <div class="rss">
      <div class="rs"><div class="rsl">得分</div><div class="rsv" id="rsc">0</div></div>
      <div class="rs"><div class="rsl">正确率</div><div class="rsv" id="rac">0%</div></div>
      <div class="rs"><div class="rsl">题数</div><div class="rsv" id="rwc">0</div></div>
      <div class="rs"><div class="rsl">剩余HP</div><div class="rsv" id="rhp">0%</div></div>
    </div>
    <div class="xpw"><div class="xpf" id="xpf" style="width:0%"></div></div>
    <div class="xpl" id="xpl">+0 XP</div>
    <div class="rbs">
      <button class="rb" onclick="goMap()">🗺 返回地图</button>
      <button class="rb sec" onclick="replay()">🔄 再来一局</button>
    </div>
  </div>
</div>

</div></div></div>
<script>
// ══════════════════════════════════════
// HISTORY (localStorage, anti-repeat)
// ══════════════════════════════════════
const HMAX=8;
function hLoad(k){try{return JSON.parse(localStorage.getItem('dg_h_'+k)||'[]');}catch(e){return[];}}
function hSave(k,a){try{localStorage.setItem('dg_h_'+k,JSON.stringify(a));}catch(e){}}
function pickFresh(pool,hkey,n){
  let h=hLoad(hkey);
  let idx=pool.map((_,i)=>i).filter(i=>!h.includes(i));
  if(idx.length<n) idx=pool.map((_,i)=>i);
  idx.sort(()=>Math.random()-.5);
  const ch=idx.slice(0,n);
  ch.forEach(i=>{h.push(i);if(h.length>HMAX)h.shift();});
  hSave(hkey,h);
  return ch.map(i=>pool[i]);
}
function saveStars(){try{localStorage.setItem('dg_stars',JSON.stringify(G.lvSt));}catch(e){}}
function loadStars(){try{const s=JSON.parse(localStorage.getItem('dg_stars')||'[0,0,0]');G.lvSt=s;}catch(e){}}

// ══════════════════════════════════════
// DATA — ENGLISH
// ══════════════════════════════════════
const WORDS=[
  {w:'TIGER',zh:'老虎'},{w:'LION',zh:'狮子'},{w:'PANDA',zh:'熊猫'},{w:'MONKEY',zh:'猴子'},
  {w:'FOX',zh:'狐狸'},{w:'HORSE',zh:'马'},{w:'ZEBRA',zh:'斑马'},{w:'BEAR',zh:'熊'},
  {w:'WOLF',zh:'狼'},{w:'DEER',zh:'鹿'},{w:'PLANE',zh:'飞机'},{w:'TRAIN',zh:'火车'},
  {w:'LEMON',zh:'柠檬'},{w:'BREAD',zh:'面包'},{w:'SUGAR',zh:'糖'},{w:'MILK',zh:'牛奶'},
  {w:'COAT',zh:'外套'},{w:'SCARF',zh:'围巾'},{w:'JACKET',zh:'夹克'},{w:'DRESS',zh:'连衣裙'},
  {w:'SNOW',zh:'雪'},{w:'CLOUD',zh:'云'},{w:'SPRING',zh:'春天'},{w:'WINTER',zh:'冬天'},
  {w:'SOFT',zh:'软的'},{w:'HARD',zh:'硬的'},{w:'SWEET',zh:'甜的'},{w:'SOUR',zh:'酸的'},
  {w:'ROUND',zh:'圆形'},{w:'ROBOT',zh:'机器人'},{w:'RIVER',zh:'河流'},{w:'BEACH',zh:'海滩'},
  {w:'GRASS',zh:'草'},{w:'JUMP',zh:'跳'},{w:'SWIM',zh:'游泳'},{w:'CLIMB',zh:'爬'},
  {w:'ROUGH',zh:'粗糙的'},{w:'SMOOTH',zh:'光滑的'},{w:'HUNGRY',zh:'饿的'},{w:'STRONG',zh:'强壮的'},
];
const PREP=[

const SS={ans:[],sel:null,blanks:[],exps:[],poem:null,type:'fill'};
function startLv(i){G.lv=i;G.mathOk=false;G.mathTry=0;hideAll();buildStory(i);document.getElementById('story').classList.remove('hide');}
function buildStory(i){
  const dinos=['🦖','🐉','🦕'],titles=['丛林危机！','火山警报！','冰川封印！'],subs=['恐龙星球·丛林区','恐龙星球·火山区','恐龙星球·冰川区'];
  document.getElementById('sdino').textContent=dinos[i];
  document.getElementById('stitle').textContent=titles[i];
  document.getElementById('ssub').textContent=subs[i];
  document.getElementById('sfb').textContent='';
  document.getElementById('snxt').classList.remove('show');
  document.getElementById('wbo').innerHTML='';
  document.getElementById('wbp').textContent='请点击空格选词';
  document.getElementById('wbh').textContent='';
  SS.type=i===1?'poetry':'fill';
  if(SS.type==='fill'){
    const [p]=pickFresh(CHN0,'s'+i,1);
    SS.blanks=p.b; SS.exps=p.e; SS.ans=Array(p.b.length).fill(null); SS.sel=null;
    let html='';
    p.t.split(/(\[\d\])/).forEach(s=>{
      if(/^\[\d\]$/.test(s)){const k=parseInt(s[1]);html+=`<span class="bl" id="bl${k}" onclick="selBl(${k})">${'　'.repeat(Math.max(2,SS.blanks[k].a.length))}</span>`;}
      else html+=s;
    });
    document.getElementById('scontent').innerHTML=`<div class="spass">${html}</div>`;
  } else {
    const [poem]=pickFresh(POEMS,'s1',1);
    SS.poem=poem; SS.ans=Array(poem.blanks.length+2).fill(null); SS.sel=null;
    let lh=poem.lines.map(l=>l.replace(/\[(\d)\]/g,(_,k)=>`<span class="pbl" id="pbl${k}" onclick="selPbl(${k})">　</span>`)).join('<br>');
    document.getElementById('scontent').innerHTML=`<div class="pbox"><div class="pmeta">《${poem.title}》&nbsp;&nbsp;作者：<span class="pbl" id="pbla" onclick="selPbl('a')" style="min-width:52px">${'　'.repeat(3)}</span>&nbsp;&nbsp;朝代：<span class="pbl" id="pbld" onclick="selPbl('d')" style="min-width:26px">　</span>代</div><div class="pline">${lh}</div><div style="font-size:11px;color:#7986cb;margin-top:8px">诗意：${poem.meaning}</div></div>`;
  }
}
function selBl(k){
  SS.sel=k; document.querySelectorAll('.bl').forEach(b=>b.classList.remove('sel'));
  document.getElementById(`bl${k}`)?.classList.add('sel');
  const b=SS.blanks[k]; document.getElementById('wbp').textContent=b.l+'：'; document.getElementById('wbh').textContent=b.h;
  const opts=document.getElementById('wbo'); opts.innerHTML='';
  b.o.forEach(w=>{const c=document.createElement('button');c.className='wc';c.textContent=w;if(SS.ans.includes(w))c.classList.add('used');c.onclick=()=>fillBl(k,w);opts.appendChild(c);});
}
function fillBl(k,word){
  SS.ans.forEach((a,i)=>{if(a===word&&i!==k){SS.ans[i]=null;const e=document.getElementById(`bl${i}`);if(e){e.textContent='　'.repeat(Math.max(2,SS.blanks[i].a.length));e.classList.remove('ok');}}});
  SS.ans[k]=word; const el=document.getElementById(`bl${k}`);
  if(el){el.textContent=word;el.classList.remove('sel','err');el.classList.add('ok');}
  SS.sel=null; document.getElementById('wbp').textContent='请点击空格选词'; document.getElementById('wbh').textContent=''; document.getElementById('wbo').innerHTML='';
  if(SS.ans.every(a=>a!==null)) valFill();
}
function valFill(){
  let ok=true; const errs=[];
  SS.blanks.forEach((b,i)=>{if(SS.ans[i]!==b.a){ok=false;errs.push(i);document.getElementById(`bl${i}`)?.classList.add('err');setTimeout(()=>{SS.ans[i]=null;const e=document.getElementById(`bl${i}`);if(e){e.textContent='　'.repeat(Math.max(2,b.a.length));e.classList.remove('ok','err');}},500);}});
  const fb=document.getElementById('sfb');
  if(ok){fb.textContent='✓ 全部正确！防御系统激活！';fb.style.color='var(--g)';document.getElementById('snxt').classList.add('show');}
  else{fb.textContent='✗ '+SS.exps[errs[0]];fb.style.color='var(--rd)';}
}
function selPbl(k){
  SS.sel=k; document.querySelectorAll('.pbl').forEach(b=>b.classList.remove('sel'));
  document.getElementById(`pbl${k}`)?.classList.add('sel');
  const p=SS.poem; let opts=[],hint='',label='';
  if(k==='a'){label='作者';hint='选择这首诗的作者';opts=p.aQ.o;}
  else if(k==='d'){label='朝代';hint='选择作者所在朝代';opts=p.dQ.o;}
  else{const b=p.blanks[k];label=`第${parseInt(k)+1}空`;hint=b.h;opts=b.o;}
  document.getElementById('wbp').textContent=label+'：'; document.getElementById('wbh').textContent=hint;
  const oe=document.getElementById('wbo'); oe.innerHTML='';
  opts.forEach(w=>{const c=document.createElement('button');c.className='wc';c.textContent=w;c.onclick=()=>fillPbl(k,w);oe.appendChild(c);});
}
function fillPbl(k,word){
  const p=SS.poem; const el=document.getElementById(`pbl${k}`);
  if(el){el.textContent=word;el.classList.remove('sel','err');el.classList.add('ok');}
  const km={'a':p.blanks.length,'d':p.blanks.length+1};
  SS.ans[typeof k==='number'?k:km[k]]=word;
  SS.sel=null; document.getElementById('wbp').textContent='请点击空格选词'; document.getElementById('wbh').textContent=''; document.getElementById('wbo').innerHTML='';
  if(SS.ans.every(a=>a!==null)) valPoem();
}
function valPoem(){
  const p=SS.poem; let ok=true; const errs=[];
  p.blanks.forEach((b,i)=>{if(SS.ans[i]!==b.a){ok=false;errs.push({exp:p.exps[i]});document.getElementById(`pbl${i}`)?.classList.add('err');setTimeout(()=>{SS.ans[i]=null;const e=document.getElementById(`pbl${i}`);if(e){e.textContent='　';e.classList.remove('ok','err');}},500);}});
  const aA=p.aQ.o[p.aQ.a];
  if(SS.ans[p.blanks.length]!==aA){ok=false;errs.push({exp:`《${p.title}》的作者是${p.author}。`});document.getElementById('pbla')?.classList.add('err');setTimeout(()=>{SS.ans[p.blanks.length]=null;const e=document.getElementById('pbla');if(e){e.textContent='　'.repeat(3);e.classList.remove('ok','err');}},500);}
  const dA=p.dQ.o[p.dQ.a];
  if(SS.ans[p.blanks.length+1]!==dA){ok=false;if(!errs.find(e=>e.exp.includes('作者')))errs.push({exp:`${p.author}是${p.dynasty}代诗人。`});document.getElementById('pbld')?.classList.add('err');setTimeout(()=>{SS.ans[p.blanks.length+1]=null;const e=document.getElementById('pbld');if(e){e.textContent='　';e.classList.remove('ok','err');}},500);}
  const fb=document.getElementById('sfb');
  if(ok){fb.textContent='✓ 全部正确！';fb.style.color='var(--g)';document.getElementById('snxt').classList.add('show');}
  else{fb.textContent='✗ '+errs[0].exp;fb.style.color='var(--rd)';}
}

  else{typeEl.className='htype en';typeEl.textContent='英语';eblbl.textContent='吞噬';}
  if(q.t==='spell') loadSpell(q.d);
  else if(q.t==='prep') loadPrep(q.d);
  else if(q.t==='sent') loadSent(q.d);
  else if(q.t==='egg') loadEgg(q.d);
  else if(q.t==='meteor') loadMeteor(q.d);
  setTimeout(measureQ,40);
}

// ── ENGLISH SPELL ──
function loadSpell(d){
  const tgt=d.w.split('');
  const pool=[...tgt];
  const inW=new Set(tgt);
  const dec='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(c=>!inW.has(c)).sort(()=>Math.random()-.5);
  for(let i=0;i<Math.min(6,10-pool.length);i++) pool.push(dec[i]);
  pool.sort(()=>Math.random()-.5);
  G.curQ={t:'spell',d,filled:[],tgt};
  G.eggs=[]; G.meteors=[]; G.dinos=[];
  spawnGrid(pool);
  document.getElementById('qtb').textContent='🔡 英语拼写 · 找到正确字母按顺序吞噬';
  document.getElementById('qt').textContent=`拼出单词：${d.zh}（${d.w.length}个字母）`;
  document.getElementById('qsc').style.display='none';
  document.getElementById('wpl').style.display='block';
  document.getElementById('wzh').textContent=d.zh;
  updSlots();
}

}

const DE=['🦕','🦎','🐊','🐢','🦗','🐍'];

// English dinos (letter labels)
function spawnGrid(labels){
  G.dinos=[];
  const r=Math.min(W,H)*.044, n=labels.length;
  const cols=Math.ceil(Math.sqrt(n*1.6)), rows=Math.ceil(n/cols);
  const {top,bot}=getPlayArea();
  const cw=(W*.88)/cols, ch=(bot-top)/rows;
  [...labels].sort(()=>Math.random()-.5).forEach((lbl,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    G.dinos.push({lbl,x:W*.06+col*cw+cw*.15+Math.random()*cw*.7,y:top+row*ch+ch*.1+Math.random()*ch*.65,vx:(Math.random()-.5)*26,vy:(Math.random()-.5)*26,r,e:DE[i%6],wb:Math.random()*Math.PI*2,dead:false});
  });
}
function spawnWord(opts,ans){
  G.dinos=[];
  const r=Math.min(W,H)*.046, n=opts.length;
  const {top,bot}=getPlayArea();
  const sp=W/(n+1), my=(top+bot)/2;
  opts.forEach((opt,i)=>{
    G.dinos.push({lbl:opt,isTarget:opt===ans,x:sp*(i+1)+(Math.random()-.5)*sp*.22,y:my+(Math.random()-.5)*(bot-top)*.38,vx:(Math.random()-.5)*28,vy:(Math.random()-.5)*28,r,e:DE[i%6],wb:Math.random()*Math.PI*2,dead:false});
  });
}
function addDino(lbl,isTarget){
  const r=Math.min(W,H)*.044; const {top,bot}=getPlayArea();
  G.dinos.push({lbl,isTarget,x:W*.1+Math.random()*W*.8,y:top+Math.random()*(bot-top),vx:(Math.random()-.5)*26,vy:(Math.random()-.5)*26,r,e:DE[Math.floor(Math.random()*6)],wb:0,dead:false});
}

// Eggs (Chinese)
function spawnEggs(opts,ans){
  G.eggs=[];
  const n=opts.length, r=Math.min(W,H)*.06;
  const {top,bot}=getPlayArea();
  const sp=W/(n+1), my=(top+bot)/2;
  const eggColors=['#ffe0b2','#f8bbd0','#dcedc8','#b3e5fc'];

    G.eggs.push({lbl:opt,isTarget:opt===ans,x:sp*(i+1),y:my+(Math.random()-.5)*(bot-top)*.3,r,color:eggColors[i%4],wb:Math.random()*Math.PI*2,dead:false,hatched:false,hatchTimer:0});

const eb=document.getElementById('eb');

function doAction(){
  if(G.phase!=='play') return;
  const q=G.curQ; if(!q) return;
  const h=G.hero;
  if(q.t==='spell')       doEat(h,q);
  else if(q.t==='prep'||q.t==='sent') doEat(h,q);
  else if(q.t==='egg')    doStomp(h,q);
  else if(q.t==='meteor') doHit(h,q);
}

function doEat(h,q){
  let cl=null, bd=Infinity;
  G.dinos.forEach(d=>{if(d.dead)return;const ds=Math.hypot(h.x-d.x,h.y-d.y);if(ds<h.r+d.r+18&&ds<bd){bd=ds;cl=d;}});
  if(!cl){flashBtn();return;}
  if(q.t==='spell'){
    const need=q.tgt[q.filled.length]; G.totE++;
    if(cl.lbl===need){
      G.okE++;cl.dead=true;spawnPts(cl.x,cl.y,'76,175,80',10);sfxEatOk();
      q.filled.push(need);G.score+=50;updSlots();
      if(q.filled.length>=q.tgt.length){G.score+=150;showPop(`✓ ${q.d.w}（${q.d.zh}）`);sfxWordDone();setTimeout(nextQ,900);}
      else{const inW=new Set(q.tgt);const dec='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(c=>!inW.has(c)).sort(()=>Math.random()-.5);addDino(dec[0]||'X',false);}
    } else{
      cl.dead=true;spawnPts(cl.x,cl.y,'198,40,40',6);sfxEatWrong();takeDmg(15);G.score=Math.max(0,G.score-15);
      const nextNeed=q.tgt[q.filled.length];
      const alive=G.dinos.some(d=>!d.dead&&d.lbl===nextNeed);
      if(!alive) addDino(nextNeed,false);
      else{const inW=new Set(q.tgt);const dec='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(c=>!inW.has(c)).sort(()=>Math.random()-.5);addDino(dec[0]||'Z',false);}
    }
  } else {
    if(q.done) return; G.totE++;
    if(cl.isTarget){G.okE++;cl.dead=true;q.done=true;spawnPts(cl.x,cl.y,'76,175,80',12);sfxWordDone();G.score+=120;showPop('✓ Correct!');setTimeout(nextQ,900);}
    else{cl.dead=true;spawnPts(cl.x,cl.y,'198,40,40',8);sfxEatWrong();takeDmg(20);G.score=Math.max(0,G.score-20);addDino(cl.lbl,false);}
  }
  updHUD();
}

function doStomp(h,q){
  if(q.done) return;
  let cl=null, bd=Infinity;
  G.eggs.forEach(e=>{if(e.dead||e.hatched)return;const ds=Math.hypot(h.x-e.x,h.y-e.y);if(ds<h.r+e.r+16&&ds<bd){bd=ds;cl=e;}});
  if(!cl){flashBtn();return;}
  G.totE++;
  if(cl.isTarget){
    G.okE++;cl.hatched=true;cl.hatchTimer=60;q.done=true;
    spawnPts(cl.x,cl.y,'76,175,80',14);sfxWordDone();G.score+=120;
    showPop('✓ '+cl.lbl);
    setTimeout(nextQ,1000);
  } else {
    cl.dead=true;spawnPts(cl.x,cl.y,'198,40,40',8);sfxEatWrong();takeDmg(15);G.score=Math.max(0,G.score-15);
    // show full explanation in question area
    document.getElementById('qtb').textContent='✗ 踩错了！看看解析：';
    document.getElementById('qt').textContent=q.d.e;
  }
  updHUD();
}

function doHit(h,q){
  if(q.done) return;
  let cl=null, bd=Infinity;
  G.meteors.forEach(m=>{if(m.dead)return;const ds=Math.hypot(h.x-m.x,h.y-m.y);if(ds<h.r+m.r+18&&ds<bd){bd=ds;cl=m;}});
  if(!cl){flashBtn();return;}
  G.totE++;
  if(cl.isTarget){
    G.okE++;cl.dead=true;q.done=true;
    spawnPts(cl.x,cl.y,'76,175,80',16);sfxWordDone();G.score+=120;
    showPop('✓ '+cl.lbl);
    setTimeout(nextQ,900);
  } else {
    cl.dead=true;spawnPts(cl.x,cl.y,'198,40,40',10);sfxEatWrong();takeDmg(15);G.score=Math.max(0,G.score-15);
    document.getElementById('qtb').textContent='✗ 撞错了！看看解析：';
    document.getElementById('qt').textContent=q.d.e;
    // respawn wrong meteor
    const r=Math.min(W,H)*.065; const {top,bot}=getPlayArea();
    G.meteors.push({lbl:cl.lbl,isTarget:false,x:W*.1+Math.random()*W*.8,y:top+Math.random()*(bot-top),r,wb:Math.random()*Math.PI*2,dead:false,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8});
  }
  updHUD();
}

const joy={active:false,dx:0,dy:0,sx:0,sy:0};
const jz=document.getElementById('jz'),jk=document.getElementById('jk');
function jD(e){e.preventDefault();const t=e.touches?e.touches[0]:e;const r=jz.getBoundingClientRect();joy.active=true;joy.sx=r.left+r.width/2;joy.sy=r.top+r.height/2;}
function jM(e){e.preventDefault();if(!joy.active)return;const t=e.touches?e.touches[0]:e;const dx=t.clientX-joy.sx,dy=t.clientY-joy.sy;const d=Math.hypot(dx,dy),a=Math.atan2(dy,dx);joy.dx=d>6?Math.cos(a):0;joy.dy=d>6?Math.sin(a):0;const cl=Math.min(d,40);jk.style.transform=`translate(calc(-50% + ${Math.cos(a)*cl}px),calc(-50% + ${Math.sin(a)*cl}px))`;}
function jU(e){e.preventDefault();joy.active=false;joy.dx=0;joy.dy=0;jk.style.transform='translate(-50%,-50%)';}
jz.addEventListener('touchstart',jD,{passive:false});jz.addEventListener('touchmove',jM,{passive:false});jz.addEventListener('touchend',jU,{passive:false});
jz.addEventListener('mousedown',jD);document.addEventListener('mousemove',e=>{if(joy.active)jM(e);});document.addEventListener('mouseup',e=>{if(joy.active)jU(e);});
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;if((e.key===' '||e.key==='Enter')&&G.phase==='play'){e.preventDefault();doAction();}});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
function kx(){let d=0;if(keys['ArrowLeft']||keys['a']||keys['A'])d-=1;if(keys['ArrowRight']||keys['d']||keys['D'])d+=1;return d;}
function ky(){let d=0;if(keys['ArrowUp']||keys['w']||keys['W'])d-=1;if(keys['ArrowDown']||keys['s']||keys['S'])d+=1;return d;}

// ══════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  ctx.clearRect(0,0,W,H); drawBG();
  if(G.phase==='play'){
    updHero(dt);updDinos(dt);updEggs(dt);updMeteors(dt);
    drawMeteors();drawEggs();drawDinos();drawHero();drawPts();
    updBuff(dt);updEb();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#e0f7fa');g.addColorStop(1,'#f1f8e9');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  starT+=.012;
  STARS.forEach(s=>{ctx.beginPath();ctx.arc(s.x*W,s.y*(PB||H*.85),s.r,0,Math.PI*2);ctx.fillStyle=`rgba(165,214,167,${s.a*(0.5+0.5*Math.sin(starT/s.tw))})`;ctx.fill();});
  ctx.fillStyle='#c8e6c9';ctx.fillRect(0,(PB||H*.85),W,H);
  ctx.textAlign='center';ctx.textBaseline='bottom';
  for(let i=0;i<12;i++){ctx.globalAlpha=.4;ctx.font=`${H*.04}px serif`;ctx.fillText('🌿',(i/11)*W*.95+W*.025,(PB||H*.85)+H*.036);}
  ctx.globalAlpha=1;
}

function updHero(dt){
  const h=G.hero,spd=G.buffT>0?h.bspd:h.spd,dx=joy.dx||kx(),dy=joy.dy||ky();
  h.x=Math.max(h.r,Math.min(W-h.r,h.x+dx*spd*dt));
  h.y=Math.max(PT+h.r,Math.min((PB||H*.82)-h.r,h.y+dy*spd*dt));
}
function drawHero(){
  const h=G.hero;
  ctx.beginPath();ctx.arc(h.x,h.y,h.r+16,0,Math.PI*2);ctx.strokeStyle='rgba(27,138,90,.12)';ctx.lineWidth=1.5;ctx.stroke();
  if(G.buffT>0){ctx.beginPath();ctx.arc(h.x,h.y,h.r+6,0,Math.PI*2);ctx.strokeStyle='rgba(230,144,10,.5)';ctx.lineWidth=2;ctx.stroke();}
  ctx.font=`${h.r*2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🦖',h.x,h.y);
}

// English dinos
function updDinos(dt){
  G.dinos.forEach(d=>{
    if(d.dead)return; d.wb+=dt*1.8;
    if(Math.random()<.012){d.vx=(Math.random()-.5)*38;d.vy=(Math.random()-.5)*38;}
    d.x+=d.vx*dt;d.y+=d.vy*dt;
    if(d.x<d.r||d.x>W-d.r){d.vx*=-1;d.x=Math.max(d.r,Math.min(W-d.r,d.x));}
    const {top,bot}=getPlayArea();
    if(d.y<top+d.r||d.y>bot-d.r){d.vy*=-1;d.y=Math.max(top+d.r,Math.min(bot-d.r,d.y));}
  });
}
function drawDinos(){
  const h=G.hero;
  G.dinos.forEach(d=>{
    if(d.dead)return;
    const ir=Math.hypot(h.x-d.x,h.y-d.y)<h.r+d.r+18;
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(Math.sin(d.wb)*.07);
    if(ir){ctx.beginPath();ctx.arc(0,0,d.r+8,0,Math.PI*2);ctx.strokeStyle='rgba(230,144,10,.85)';ctx.lineWidth=2.5;ctx.stroke();}
    ctx.font=`${d.r*1.85}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.e,0,0);
    const bs=Math.min(d.r*.82,13),tw=d.lbl.length*bs*.68+8;
    ctx.beginPath();ctx.roundRect(d.r*.45-tw/2,-d.r*.55-bs/2-4,tw,bs+8,4);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#a5d6a7';ctx.lineWidth=1.2;ctx.stroke();
    ctx.font=`bold ${bs}px monospace`;ctx.fillStyle='#1B8A5A';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.lbl,d.r*.45,-d.r*.55);
    ctx.restore();
  });
}

// Eggs (Chinese)
function updEggs(dt){

  G.eggs.forEach(e=>{
    if(e.dead)return;
    e.wb+=dt*1.2;
    if(e.hatched){e.hatchTimer--;if(e.hatchTimer<=0)e.dead=true;return;}

  });

function drawEggs(){
  const h=G.hero;
  G.eggs.forEach(e=>{
    if(e.dead)return;
    const ir=Math.hypot(h.x-e.x,h.y-e.y)<h.r+e.r+16;
    ctx.save();ctx.translate(e.x,e.y);
    if(e.hatched){
      // hatching animation
      ctx.font=`${e.r*2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🐣',0,0);
      ctx.restore();return;
    }
    ctx.rotate(Math.sin(e.wb)*.06);
    // egg body
    ctx.beginPath();
    ctx.ellipse(0,0,e.r*.7,e.r,0,0,Math.PI*2);
    ctx.fillStyle=ir?'#fff9c4':e.color;
    ctx.fill();
    ctx.strokeStyle=ir?'#E6900A':'#a5d6a7';
    ctx.lineWidth=ir?2.5:1.5;ctx.stroke();
    // crack hint when in range
    if(ir){
      ctx.beginPath();ctx.moveTo(-4,-8);ctx.lineTo(0,-2);ctx.lineTo(4,-8);
      ctx.strokeStyle='#C62828';ctx.lineWidth=1.5;ctx.stroke();
    }
    // label
    const bs=Math.min(e.r*.75,15),tw=e.lbl.length*bs*.62+8;
    ctx.beginPath();ctx.roundRect(-tw/2,-bs/2-2,tw,bs+4,3);
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
    ctx.font=`bold ${bs}px sans-serif`;ctx.fillStyle='#1a3a2a';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.lbl,0,0);
    ctx.restore();
  });
}

// Meteors (Math)
function updMeteors(dt){
  G.meteors.forEach(m=>{
    if(m.dead)return;
    m.wb+=dt*1.5;
    // gentle floating
    m.x+=m.vx*dt; m.y+=m.vy*dt;
    if(m.x<m.r||m.x>W-m.r){m.vx*=-1;m.x=Math.max(m.r,Math.min(W-m.r,m.x));}
    const {top,bot}=getPlayArea();
    if(m.y<top+m.r||m.y>bot-m.r){m.vy*=-1;m.y=Math.max(top+m.r,Math.min(bot-m.r,m.y));}
  });
}
function drawMeteors(){
  const h=G.hero;
  G.meteors.forEach(m=>{
    if(m.dead)return;
    const ir=Math.hypot(h.x-m.x,h.y-m.y)<h.r+m.r+18;
    ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.wb*.3);
    // meteor body
    ctx.beginPath();
    for(let i=0;i<7;i++){
      const a=i/7*Math.PI*2, r=i%2===0?m.r:m.r*.68;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fillStyle=ir?'#fff9c4':'#b0bec5';ctx.fill();
    ctx.strokeStyle=ir?'#E6900A':'#78909c';ctx.lineWidth=ir?2.5:1.5;ctx.stroke();
    // glow when in range
    if(ir){ctx.shadowBlur=12;ctx.shadowColor='rgba(230,144,10,.6)';}
    // label
    const bs=Math.min(m.r*.72,16),tw=m.lbl.length*bs*.7+10;
    ctx.shadowBlur=0;
    ctx.beginPath();ctx.roundRect(-tw/2,-bs/2-2,tw,bs+4,3);
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
    ctx.font=`bold ${bs}px sans-serif`;ctx.fillStyle='#1a237e';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.lbl,0,0);
    ctx.restore();
  });
}

}

// ══════════════════════════════════════
// AUDIO ENGINE — iOS Safari compatible
// Pre-render all audio into AudioBuffers
// ══════════════════════════════════════
let AC=null,musicOn=false,_bgSrc=null,_bgBuf=null;
function initAC(){}
function makeToneBuf(freq,type,dur,vol){
  if(!AC)return null;
  const sr=AC.sampleRate,len=Math.ceil(sr*dur);
  const buf=AC.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++){
    let s=0;
    if(type==='sine') s=Math.sin(2*Math.PI*freq*i/sr);
    else if(type==='sq') s=Math.sin(2*Math.PI*freq*i/sr)>0?1:-1;
    else if(type==='tri') s=2*Math.abs(2*(i/sr*freq-Math.floor(i/sr*freq+0.5)))-1;
    else s=(Math.random()*2-1);
    const env=Math.min(1,i/(sr*0.01))*Math.max(0,1-(i/(len*0.7)));
    d[i]=s*vol*env;
  }
  return buf;
}
function playBuf(buf,when){
  if(!AC||!musicOn||!buf)return;
  const src=AC.createBufferSource();
  const g=AC.createGain();g.gain.value=0.3;
  src.buffer=buf;src.connect(g);g.connect(AC.destination);
  src.start(when);
}
let _sfx={};
function buildSfx(){
  if(!AC)return;
  _sfx.eatOk=[makeToneBuf(523,'sine',0.07,0.6),makeToneBuf(659,'sine',0.07,0.6)];
  _sfx.eatWrong=[makeToneBuf(220,'sq',0.1,0.4),makeToneBuf(180,'sq',0.12,0.3)];
  _sfx.word=[makeToneBuf(523,'sine',0.1,0.5),makeToneBuf(659,'sine',0.1,0.5),makeToneBuf(784,'sine',0.1,0.5),makeToneBuf(1046,'sine',0.15,0.5)];
  _sfx.dmg=[makeToneBuf(0,'noise',0.15,0.5)];
  _sfx.start=[makeToneBuf(392,'sq',0.12,0.35),makeToneBuf(494,'sq',0.12,0.35),makeToneBuf(587,'sq',0.12,0.35),makeToneBuf(784,'sq',0.18,0.4)];
  _sfx.correct=[makeToneBuf(784,'sine',0.1,0.45),makeToneBuf(1046,'sine',0.14,0.45)];
  _sfx.wrong=[makeToneBuf(294,'tri',0.18,0.35)];
}
function playSfx(arr,spacing=0.08){
  if(!AC||!musicOn)return;
  let t=AC.currentTime+0.01;
  arr.forEach(b=>{playBuf(b,t);t+=spacing;});
}
function sfxEatOk(){playSfx(_sfx.eatOk||[]);}
function sfxEatWrong(){playSfx(_sfx.eatWrong||[]);}
function sfxWordDone(){playSfx(_sfx.word||[],0.07);}
function sfxDamage(){playSfx(_sfx.dmg||[]);}
function sfxLevelStart(){playSfx(_sfx.start||[],0.12);}
function sfxCorrect(){playSfx(_sfx.correct||[],0.1);}
function sfxWrong(){playSfx(_sfx.wrong||[]);}

const BG_NOTES=[[523,.15],[587,.15],[659,.15],[784,.15],[880,.15],[784,.15],[659,.15],[587,.15],[523,.15],[523,.15],[659,.15],[784,.15],[880,.3],[784,.15],[659,.15],[659,.15],[587,.15],[523,.15],[494,.15],[523,.3],[587,.15],[659,.15],[784,.15],[880,.15],[784,.15],[659,.15],[523,.3],[587,.15],[523,.3]];
const BG_BASS=[[131,.6],[196,.6],[165,.6],[147,.6],[131,.6],[196,.6],[165,.6],[147,.6]];
function buildBGBuffer(){
  if(!AC)return null;
  const sr=AC.sampleRate;
  const totalDur=BG_NOTES.reduce((s,[,d])=>s+d,0);
  const len=Math.ceil(sr*totalDur);
  const buf=AC.createBuffer(1,len,sr);
  const out=buf.getChannelData(0);
  let pos=0;
  BG_NOTES.forEach(([freq,dur])=>{const nl=Math.ceil(sr*dur);for(let i=0;i<nl&&pos+i<len;i++){const env=Math.min(1,i/(sr*0.01))*Math.max(0,1-i/(nl*0.85));out[pos+i]+=Math.sin(2*Math.PI*freq*i/sr)*0.12*env;}pos+=nl;});
  let bp=0;
  BG_BASS.forEach(([freq,dur])=>{const nl=Math.ceil(sr*dur);for(let i=0;i<nl&&bp+i<len;i++){const env=Math.min(1,i/(sr*0.02))*Math.max(0,1-i/(nl*0.8));out[bp+i]+=Math.sin(2*Math.PI*freq*i/sr)*0.08*env;}bp+=nl;});
  return buf;
}
function startBGMusic(){
  if(!AC||!musicOn)return;
  stopBGMusic();
  if(!_bgBuf)_bgBuf=buildBGBuffer();
  if(!_bgBuf)return;
  const src=AC.createBufferSource();
  const g=AC.createGain();g.gain.value=0.6;
  src.buffer=_bgBuf;src.loop=true;
  src.connect(g);g.connect(AC.destination);
  src.start(0);_bgSrc=src;
}
function stopBGMusic(){if(_bgSrc){try{_bgSrc.stop();}catch(e){}_bgSrc=null;}}
function toggleMusic(){
  const btn=document.getElementById('music-btn');
  if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
  if(AC.state==='suspended')AC.resume();
  musicOn=!musicOn;
  if(musicOn){btn.textContent='🔊 音乐开';btn.style.background='#f0faf5';buildSfx();startBGMusic();}
  else{btn.textContent='🔇 音乐关';btn.style.background='#fff';stopBGMusic();}
}

  ['hud','qp','kh','jz','eb','bfw'].forEach(id=>document.getElementById(id).classList.add('hide'));
  G.phase='idle';
}
